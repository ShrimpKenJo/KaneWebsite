<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Favorites</title>
    <link rel="stylesheet" href="style.css">

    <script>
        function handleSelection(clickedBox) {
            const checkboxes = document.querySelectorAll('input[name="favorite"]');
            
            checkboxes.forEach(box => {
                if (box !== clickedBox) {
                    box.checked = false;
                }
            });
        }

        function goToSelected() {
            const selected = document.querySelector('input[name="favorite"]:checked');

            if (!selected) {
                alert("⚠ Please select one option first.");
                return;
            }

            if (selected.value === "songs") {
                location.href = "FavSongs.html";
            } 
            else if (selected.value === "movies") {
                location.href = "FavMovie.html";
            }
            else if (selected.value === "photos") {
                location.href = "FavPhoto.html";
            }
        }
    </script>
</head>
<body>

<!-- Navigation -->
<nav>
    <h2>ShrimpKenjo</h2>

    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="AboutMe.html">About</a></li>
        <li><a href="Gallery.html">Gallery</a></li>
        <li><a href="Favorites.html">Favorites</a></li>
    </ul>
</nav>

<!-- Section -->
<section>

    <h2 class="title">My Favorites</h2>

    <p>Select ONLY ONE option:</p>

    <br>

    <label>
        <input type="checkbox" name="favorite" value="songs" onclick="handleSelection(this)">
         Favorite Songs
    </label>

    <br><br>

    <label>
        <input type="checkbox" name="favorite" value="movies" onclick="handleSelection(this)">
         Favorite Movies
    </label>

    <br><br>

    <label>
        <input type="checkbox" name="favorite" value="photos" onclick="handleSelection(this)">
         Favorite Photos
    </label>

    <br><br>

    <button class="main-btn" onclick="goToSelected()">
        ✔ OK
    </button>

</section>

<!-- Back Button -->
<div class="back-area">
    <button class="Back-btn" onclick="location.href='index.html'">
        ⬅ Back to Home
    </button>
</div>

<footer>
    © 2025 Shrimpkenjo. All rights reserved.
</footer>

</body>
</html>
