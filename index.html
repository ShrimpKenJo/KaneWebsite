<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> Homepage - Kane Lacaba</title>
    <link rel="stylesheet" href="style.css">

    <script>
        function handleSelection(clickedBox) {
            const checkboxes = document.querySelectorAll('input[name="HTMLAct"]');
            checkboxes.forEach(box => {
                if (box !== clickedBox) {
                    box.checked = false;
                }
            });
        }

        function goToSelected() {
            const selected = document.querySelector('input[name="HTMLAct"]:checked');

            if (!selected) {
                alert("⚠ Please select one activity first.");
                return;
            }

            // Redirect based on selection
            if (selected.value === "Activity 1") {
                location.href = "Activity1.html";
            } else if (selected.value === "Activity 2") {
                location.href = "Activity2.html";
            }
        }
    </script>
</head>
<body>

<!-- Navigation -->
<nav>
    <h2>ShrimpKenjo</h2>

    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="AboutMe.html">About</a></li>
        <li><a href="Gallery.html">Gallery</a></li>
        <li><a href="Favorites.html">Favorites</a></li>
    </ul>
</nav>

<!-- Hero Section -->
<section class="hero-split">

    <!-- Left: Profile -->
    <div class="hero-left">
        <img src="profile.jpeg" alt="Kane Lacaba">
    </div>

    <!-- Right: Info -->
    <div class="hero-right">
        <p>Hello, I'm</p>
        <h1>KANE JOEL<br>LACABA</h1>
        <h3>Graphic Designer | Artist</h3>
        <p>I create modern and creative designs that help brands stand out.</p>
    </div>

</section>

<!-- Activities Section -->
<section>
    <h2 class="title">Here's my previous HTML activities</h2>

    <p>Select ONLY ONE option:</p>

    <br>

    <label>
        <input type="checkbox" name="HTMLAct" value="Activity 1" onclick="handleSelection(this)">
        Activity 1 : Basic HTML
    </label>
    <br>

    <label>
        <input type="checkbox" name="HTMLAct" value="Activity 2" onclick="handleSelection(this)">
        Activity 2 : Background and 10 Images
    </label>
    <br><br>

    <button class="main-btn" onclick="goToSelected()">
        ✔ OK
    </button>

    <br><br>
    <!-- Button to gallery -->
    <button class="main-btn" onclick="location.href='Gallery.html'">
        View My Gallery
    </button>

</section>

<!-- Footer -->
<footer>
    © 2025 Shrimpkenjo. All rights reserved.
</footer>

</body>
</html>
